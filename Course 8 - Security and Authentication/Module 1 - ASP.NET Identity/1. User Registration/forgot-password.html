<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="card registration-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="icon-circle mb-3">
                                <i class="bi bi-key"></i>
                            </div>
                            <h2 class="card-title fw-bold">Forgot Password?</h2>
                            <p class="text-muted">Enter your email to reset password</p>
                        </div>

                        <form id="forgotPasswordForm" novalidate>
                            <div class="mb-4">
                                <label for="email" class="form-label">
                                    <i class="bi bi-envelope me-1"></i>Email Address
                                </label>
                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    name="email"
                                    placeholder="name@example.com"
                                    required>
                                <div class="invalid-feedback">
                                    Please enter a valid email address.
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 mb-3" id="btnSubmit">
                                <i class="bi bi-send me-2"></i>Send Reset Link
                            </button>

                            <p class="text-center text-muted mb-0">
                                <a href="login.html" class="text-decoration-none">
                                    <i class="bi bi-arrow-left me-1"></i>Back to Login
                                </a>
                            </p>
                        </form>
                    </div>
                </div>

                <p class="text-center text-white-50 mt-3 small footer-text">
                    &copy; 2025 User Registration Demo
                </p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="successModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-5">
                    <div class="success-checkmark mb-4">
                        <i class="bi bi-envelope-check-fill text-success"></i>
                    </div>
                    <h4 class="mb-3">Email Sent!</h4>
                    <p class="text-muted mb-4">Check your inbox for password reset instructions.</p>
                    <a href="login.html" class="btn btn-primary px-4">
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/validation.js"></script>
</body>
</html>
