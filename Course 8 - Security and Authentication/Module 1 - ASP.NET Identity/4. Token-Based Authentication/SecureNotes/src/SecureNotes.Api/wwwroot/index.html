<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureNotes — JWT Auth Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/app.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        jwt: { header: '#60a5fa', payload: '#4ade80', signature: '#f87171' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <header id="app-header" class="hidden">
        <nav class="bg-gray-800 border-b border-gray-700 px-4 py-3">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <a href="#/dashboard" class="text-xl font-bold text-white flex items-center gap-2">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    SecureNotes
                </a>
                <div id="token-status-bar"></div>
            </div>
        </nav>
    </header>

    <main id="app" class="flex-1"></main>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
